# A real workflow on a real site: tour world landmarks on OpenStreetMap.
# Each stop searches a place, lets the map fly there, asserts the result
# resolved (smoke test), and captures a screenshot artifact.
# Requires network access.
name: maps-demo

permissions:
  browser: allow
  network: allow

recording:
  viewport:
    width: 1280
    height: 720
  cursor:
    visible: true
    clickEmphasis: true
  pacing:
    actionDelayMs: 800
    typeDelayMs: 75
  output:
    format: gif

steps:
  - browser:
      open: "https://www.openstreetmap.org/"

  - wait:
      seconds: 2

  # --- Stop 1: Paris ---
  # `>> visible=true` picks the desktop search box over the hidden mobile one.
  - browser:
      type:
        selector: "#query >> visible=true"
        text: "Eiffel Tower, Paris"
  - browser:
      click: ".search_form button[type=submit] >> visible=true"
  - wait:
      seconds: 4
  - assert:
      text: "Eiffel Tower"
      label: paris
  - screenshot:
      label: paris

  # --- Stop 2: Rome ---
  - browser:
      type:
        selector: "#query >> visible=true"
        text: "Colosseum, Rome"
  - browser:
      click: ".search_form button[type=submit] >> visible=true"
  - wait:
      seconds: 4
  - assert:
      text: "Roma"
      label: rome
  - screenshot:
      label: rome

  # --- Stop 3: Sydney ---
  - browser:
      type:
        selector: "#query >> visible=true"
        text: "Sydney Opera House"
  - browser:
      click: ".search_form button[type=submit] >> visible=true"
  - wait:
      seconds: 4
  - assert:
      text: "Sydney"
      label: sydney
  - screenshot:
      label: sydney

  - wait:
      seconds: 2

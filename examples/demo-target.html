<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TraceCast Demo Target</title>
    <style>
      :root {
        --ink: #0f172a;
        --muted: #64748b;
        --brand: #6366f1;
        --brand-2: #8b5cf6;
        --ok: #16a34a;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1100px 500px at 10% -10%, #ede9fe 0%, rgba(237,233,254,0) 60%),
          radial-gradient(900px 500px at 110% 10%, #e0e7ff 0%, rgba(224,231,255,0) 55%),
          #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main { width: 100%; max-width: 560px; padding: 40px 24px; }
      .brand {
        display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
      }
      .dot {
        width: 38px; height: 38px; border-radius: 11px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        box-shadow: 0 8px 20px rgba(99,102,241,0.35);
      }
      h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
      .sub { margin: 6px 0 26px; color: var(--muted); font-size: 15px; }
      .panel {
        background: #ffffff;
        border: 1px solid #e7e9f3;
        border-radius: 16px;
        padding: 26px;
        box-shadow: 0 24px 60px -28px rgba(30,27,75,0.45);
      }
      label { display: block; margin-bottom: 8px; font-weight: 650; font-size: 14px; }
      input {
        width: 100%; padding: 13px 14px; font-size: 16px;
        border: 1px solid #cbd2e1; border-radius: 10px; outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
      button {
        margin-top: 16px; width: 100%; padding: 13px 16px;
        border: 0; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        cursor: pointer; transition: transform 0.08s, filter 0.15s;
      }
      button:hover { filter: brightness(1.05); }
      button:active { transform: translateY(1px); }
      #result {
        margin-top: 18px; min-height: 26px; font-weight: 700; color: var(--ok);
        display: flex; align-items: center; gap: 8px;
        opacity: 0; transform: translateY(6px); transition: opacity 0.3s, transform 0.3s;
      }
      #result.show { opacity: 1; transform: none; }
      #result .check {
        display: inline-flex; align-items: center; justify-content: center;
        width: 22px; height: 22px; border-radius: 50%; background: var(--ok); color: #fff; font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="dot"></div>
        <h1>TraceCast</h1>
      </div>
      <p class="sub">demo-as-code &middot; reproducible terminal + browser recordings</p>

      <section class="panel">
        <label for="demo-name">Demo name</label>
        <input id="demo-name" placeholder="Enter a demo name" autocomplete="off" />
        <button id="run-demo" type="button">Run demo</button>
        <div id="result" aria-live="polite"></div>
      </section>
    </main>

    <script>
      document.getElementById("run-demo").addEventListener("click", () => {
        const name = document.getElementById("demo-name").value || "demo";
        const result = document.getElementById("result");
        result.innerHTML = `<span class="check">&#10003;</span> ${name} workflow recorded.`;
        result.classList.add("show");
      });
    </script>
  </body>
</html>
